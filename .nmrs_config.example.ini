# NMRS Toolkit configuration template.
#
# Copy this file to ".nmrs_config.ini" (note the leading dot) next to the
# binary on first launch. The app will then MOVE it into a platform-specific
# secure location and set 0600 permissions:
#
#   Linux    ~/.config/nmrs_toolkit/.nmrs_config.ini
#   macOS    ~/Library/Application Support/NMRS_Toolkit/.nmrs_config.ini
#   Windows  %APPDATA%\NMRS_Toolkit\.nmrs_config.ini
#
# After that first launch, edit it in place at the secure location. The live
# file is git-ignored — never commit credentials or keys.

[database]
host = localhost
port = 3306
user = root
password = CHANGE_ME
database = openmrs

# profile_label colors the DB banner. Recognised:
#   PROD/PRODUCTION (red), STAGING/STAGE/UAT (amber),
#   TEST/DEV (green), LOCAL (slate). Anything else renders neutral grey.
# Leave blank to show "UNLABELED".
profile_label = LOCAL

[settings]
admin_name = Administrator

# Launch-gate password prompted when the app starts. Set your own value.
# Leave blank to disable the gate entirely (app opens straight to the tabs).
admin_password = changeme

# Optional manual override for the facility name used in backup filenames.
# If blank, the app queries:
#   SELECT property_value FROM global_property WHERE property = 'Facility_Name';
# Falls back to "unknown_facility" if the lookup fails.
facility_name =

[backup]
# Daily encrypted backup to ~/NMRS_DB (Linux/macOS) or C:\NMRS_DB (Windows).
# Schedule (14:00 Mon-Fri + on system startup) is installed via OS scheduler
# on first launch. Set enabled = false to skip the auto-install.
enabled = true

# 64-char hex (32 bytes) used as the AES-GCM key for backups at this site.
# Generate per facility from the manager's master_secret using the supplied
# derive_key.py utility (or the Manager Tools tab if running as a manager).
# Leave blank for now if you haven't run the migration to per-facility keys yet.
backup_key =

# Retention policies (number of files kept).
retention_count = 10
pre_restore_retention = 5

[manager]
# Only populate on the manager's machine. Used to derive each facility's
# backup_key. Leave blank on facility installs.
# 64-char hex (32 bytes), generated once and kept secret.
master_secret =

# Optional: path to a newline-delimited list of EXACT facility names. When
# master_secret is set AND this list is non-empty, the Decrypt tab shows a
# facility dropdown that derives each facility's key on the fly — handy for a
# manager decrypting any site's backup. Relative paths resolve next to this
# config. Default if blank: facilities.txt beside this config.
# Maintain it with:  derive_key.py "Facility Name" --save --facilities-file <path>
facilities_file =

[ui]
# Set true on the manager's machine to expose the Decrypt tab. Site installs
# should leave this false — site users never need to decrypt by hand.
decrypt_tab_enabled = false
